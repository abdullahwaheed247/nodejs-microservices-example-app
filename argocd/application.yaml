apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodejs-microservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abdullahwaheed247/nodejs-microservices-example-app
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
#change
