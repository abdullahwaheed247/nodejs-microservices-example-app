apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
        - name: users
          image: 22i0765/users:925106454f4c9c68ffc75b3c0287abe847499ab1
          ports:
            - containerPort: 80
          env:
            - name: DBHOST
              value: "mongodb://mongo:27017"
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
spec:
  selector:
    app: users
  ports:
    - port: 4001
      targetPort: 80