apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: 22i0765/web:372ec1eeecfb7a6f458f50a06724aafa1dc29be0
          ports:
            - containerPort: 4000
          env:
            - name: USERS_SERVICE_URL
              value: "http://users-service:4001"
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30080